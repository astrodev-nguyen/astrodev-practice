<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Recall Practice</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- React & Babel Core -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-dark: #09090b;
            /* Zinc 950 */
            --surface: rgba(18, 18, 24, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(168, 85, 247, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-grad-hover: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            --success: #34d399;
            --danger: #fb7185;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 32px;
            --shadow-float: 0 20px 60px -15px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
        }

        /* ORBIT DYNAMICS */
        .bg-orbit {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(18, 18, 24, 0) 0%, rgba(9, 9, 11, 1) 100%);
        }

        .orbit-node {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: orbit 20s infinite alternate ease-in-out;
        }

        .node1 {
            width: 50vw;
            height: 50vw;
            background: #6366f1;
            top: -15%;
            left: -10%;
            animation-duration: 25s;
        }

        .node2 {
            width: 45vw;
            height: 45vw;
            background: #a855f7;
            bottom: -15%;
            right: -10%;
            animation-delay: -5s;
            animation-duration: 30s;
        }

        .node3 {
            width: 35vw;
            height: 35vw;
            background: #ec4899;
            top: 30%;
            right: 10%;
            animation-delay: -12s;
            animation-duration: 22s;
        }

        @keyframes orbit {
            from {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }

            to {
                transform: translate(8vw, 6vh) rotate(45deg) scale(1.15);
            }
        }

        /* 
         * TRÀN VIỀN LAPTOP (EDGE TO EDGE)
         * max-width: 1700px creates a beautiful ultra-wide spacing
         */
        .container {
            width: 100%;
            max-width: 1536px;
            margin: 0 auto;
            padding: 2.5rem 2.5rem;
            /* px-10 roughly */
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.2));
            cursor: pointer;
            width: fit-content;
            transition: opacity 0.2s ease;
        }

        h1:hover {
            opacity: 0.8;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.15rem;
            font-weight: 400;
            line-height: 1.5;
        }

        /* Nav & Stepper */
        .difficulty-stepper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 1rem 3rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .dashboard-top {
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 2fr;
            gap: 2rem;
            align-items: stretch;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .dashboard-top {
                grid-template-columns: 1fr;
            }
        }

        .level-info {
            text-align: center;
            min-width: 180px;
        }

        .difficulty-stepper button {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 50%;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
        }

        .difficulty-stepper button:hover {
            border-color: #a855f7;
            color: #a855f7;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .level-info {
            text-align: center;
            min-width: 180px;
        }

        .level-badge {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #a855f7;
            font-weight: 700;
            display: block;
            margin-bottom: 0.2rem;
        }

        .level-name {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Stats Layer */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.75rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-highlight);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
            transition: background 0.3s ease;
        }

        .stat-card.active-stat:hover::before {
            background: var(--accent-grad);
        }

        .stat-card.correct-stat:hover::before {
            background: var(--success);
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .val-acc {
            background: var(--accent-grad);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(168, 85, 247, 0.3));
        }

        .val-cor {
            color: var(--success);
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.3);
        }

        /* 
         * 2-COLUMN GRID (LAPTOP) 
         */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
            width: 100%;
        }

        .main-layout.single-col {
            grid-template-columns: 1fr;
        }

        /* Core Structure */
        .panel {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: var(--shadow-float);
            position: relative;
            height: 100%;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .panel-title svg {
            color: #a855f7;
        }

        .panel-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* Buttons Formulation */
        button {
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: var(--radius-sm);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0.6rem 1.25rem;
        }

        .primary {
            background: var(--accent-grad);
            border: none;
            color: white;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .primary:hover {
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 8px 25px rgba(99, 102, 241, 0.5);
            background: var(--accent-grad-hover);
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-highlight);
        }

        .action-btn {
            background: #a855f7;
            border: none;
            color: white;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .action-btn:hover {
            background: #9333ea;
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        /* Interactive Text */
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            font-family: inherit;
            font-size: 1.15rem;
            line-height: 1.7;
            resize: vertical;
            min-height: 140px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 0 1px #6366f1, 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .text-blurred {
            color: transparent !important;
            text-shadow: 0 0 var(--blur-amt, 14px) rgba(255, 255, 255, 0.7) !important;
            user-select: none;
        }

        .diff-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.75rem;
            font-size: 1.25rem;
            line-height: 2;
            min-height: 140px;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .progress-indicator {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 300% 100%;
            animation: progress-shimmer 3s linear infinite;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5), 0 0 40px rgba(168, 85, 247, 0.2);
            border-radius: 0 0 4px 4px;
            z-index: 10;
        }

        @keyframes progress-shimmer {
            0% {
                background-position: 100% 0%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        .word {
            display: inline-block;
            margin-right: 0.25em;
            margin-bottom: 0.3em;
            padding: 0 0.15em;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .word.correct {
            color: var(--success);
            text-shadow: 0 0 15px rgba(52, 211, 153, 0.2);
        }

        .word.incorrect {
            color: var(--danger);
            text-decoration: underline wavy rgba(251, 113, 133, 0.6);
            background: rgba(251, 113, 133, 0.1);
        }

        .word.missing {
            color: var(--text-muted);
            opacity: 0.4;
        }

        .word.visible {
            color: var(--text-main);
            opacity: 0.8;
        }

        .reference-text {
            font-size: 1.15rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border-left: 4px solid #a855f7;
            font-style: italic;
        }

        /* Results Display */
        .completion-banner {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            text-align: center;
            margin-top: 2rem;
            backdrop-filter: blur(16px);
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .completion-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(99, 102, 241, 0.15), transparent 70%);
            pointer-events: none;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .completion-banner h3 {
            color: var(--text-main);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .text-correct {
            color: var(--success);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.3);
        }

        .text-incorrect {
            color: var(--danger);
            font-weight: 600;
        }

        /* SRS Collection UI */
        .srs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.25rem;
        }

        .srs-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .srs-card:hover {
            border-color: rgba(168, 85, 247, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .srs-card.due {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(99, 102, 241, 0.08);
        }

        .srs-card.due::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: var(--radius-md);
            padding: 1px;
            background: var(--accent-grad);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        .srs-card p {
            color: var(--text-main);
            font-size: 1.05rem;
            margin-bottom: 1.25rem;
            line-height: 1.6;
        }

        .badge {
            background: var(--danger);
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(251, 113, 133, 0.4);
        }

        /* Controls */
        .tts-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
            flex-wrap: wrap;
        }

        .tts-select {
            background: rgba(0, 0, 0, 0.4);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .tts-select:focus {
            border-color: #6366f1;
            outline: none;
        }

        .rate-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .rate-control label {
            font-variant-numeric: tabular-nums;
            min-width: 85px;
        }

        .rate-control input[type="range"] {
            accent-color: #a855f7;
            width: 100px;
            margin: 0;
        }

        button.speak-btn {
            background: var(--accent-grad);
            border: none;
            color: white;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        button.speak-btn:hover {
            background: var(--accent-grad-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        button.stop-btn {
            background: rgba(251, 113, 133, 0.15);
            border: 1px solid rgba(251, 113, 133, 0.3);
            color: var(--danger);
            margin-left: auto;
        }

        .footer {
            margin-top: 1rem;
            padding-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            opacity: 0.6;
        }

        /* 
         * ĐIỆN THOẠI (MOBILE RESPONSIVE) 
         */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 3rem 1.5rem;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.75rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .difficulty-stepper {
                flex-wrap: wrap;
                gap: 1rem;
                padding: 1rem;
                width: 100%;
                justify-content: space-between;
            }

            .panel {
                padding: 1.5rem;
            }

            .panel-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .panel-actions {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
            }

            .panel-actions button {
                flex: 1;
                justify-content: center;
            }

            /* stretch buttons full width */

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            header>div {
                width: 100%;
            }

            header>button {
                width: 100%;
                justify-content: center;
            }

            .tts-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .tts-controls select {
                max-width: 100%;
            }

            .tts-controls .rate-control {
                justify-content: space-between;
            }

            .srs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const translations = {
            en: {
                heroTitle: "Master Any Text.",

                solid: "Solid work. 🔄",
                advanceTo: "Advance to Level",

        // --- CUSTOM HOOKS ---
        function useSRS() {
            const [srsData, setSrsData] = useState(() => JSON.parse(localStorage.getItem('memora-srs') || '{}'));

            const saveSRSItem = (text, accuracy) => {
                const now = Date.now();
                const current = srsData[text] || { count: 0, lastAccuracy: 0 };
                // SRS Logic: 100% -> 24h, >80% -> 10m, else -> 1m
                const delay = accuracy === 100 ? 86400000 : (accuracy > 80 ? 600000 : 60000);
                const newData = { ...srsData, [text]: { text, accuracy, lastReviewed: now, nextReview: now + delay } };
                setSrsData(newData);
                localStorage.setItem('memora-srs', JSON.stringify(newData));
            };

            const deleteSRSItem = (text) => {
                const newData = { ...srsData };
                delete newData[text];
                setSrsData(newData);
                localStorage.setItem('memora-srs', JSON.stringify(newData));
            };

            const sorted = Object.values(srsData).sort((a, b) => a.nextReview - b.nextReview);
            const dueItems = sorted.filter(i => i.nextReview <= Date.now());
            const pendingItems = sorted.filter(i => i.nextReview > Date.now());

            return { srsData, dueItems, pendingItems, deleteSRSItem, saveSRSItem };
        }

        function useTTS(text) {
            const [voices, setVoices] = useState([]);
            const [selectedVoiceURI, setSelectedVoiceURI] = useState("");
            const [rate, setRate] = useState(1.0);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [isPaused, setIsPaused] = useState(false);

            useEffect(() => {
                const updateVoices = () => {
                    const v = window.speechSynthesis.getVoices();
                    setVoices(v);
                    if (v.length && !selectedVoiceURI) {
                        const preferred = v.find(voice => voice.name.includes("Natural") || voice.name.includes("Google")) || v[0];
                        setSelectedVoiceURI(preferred.voiceURI);
                    }
                };
                updateVoices();
                window.speechSynthesis.onvoiceschanged = updateVoices;
            }, []);

            const play = () => {
                window.speechSynthesis.cancel();
                const ut = new SpeechSynthesisUtterance(text);
                const voice = voices.find(v => v.voiceURI === selectedVoiceURI);
                if (voice) ut.voice = voice;
                ut.rate = rate;
                ut.onstart = () => { setIsSpeaking(true); setIsPaused(false); };
                ut.onend = () => { setIsSpeaking(false); setIsPaused(false); };
                window.speechSynthesis.speak(ut);
            };

            const pause = () => { window.speechSynthesis.pause(); setIsPaused(true); };
            const resume = () => { window.speechSynthesis.resume(); setIsPaused(false); };
            const stop = () => { window.speechSynthesis.cancel(); setIsSpeaking(false); setIsPaused(false); };

            return { voices, selectedVoiceURI, setSelectedVoiceURI, rate, setRate, isSpeaking, isPaused, play, pause, resume, stop };
        }

        function useRecallLogic(originalText) {
            const [difficulty, setDifficulty] = useState(1);
            const [userInput, setUserInput] = useState("");
            const [isStarted, setIsStarted] = useState(false);
            const [isChecked, setIsChecked] = useState(false);
            const [isRetry, setIsRetry] = useState(false);
            const [manualIsHidden, setManualIsHidden] = useState(null);
            const [clozeIndices, setClozeIndices] = useState(new Set());

            useEffect(() => {
                if (difficulty === 4 && !isRetry) {
                    const words = originalText.trim().split(/\s+/).filter(w => w);
                    const indices = new Set();
                    const numCloze = Math.max(1, Math.floor(words.length * 0.3)); // 30% blanked out
                    while (indices.size < numCloze && indices.size < words.length) {
                        indices.add(Math.floor(Math.random() * words.length));
                    }
                    setClozeIndices(indices);
                }
            }, [difficulty, isRetry, originalText]);

            const activeMode = isRetry ? 'retry' : (difficulty === 4 ? 'cloze' : (difficulty === 5 ? 'dictation' : 'full'));

            const targetWords = useMemo(() => {
                const words = originalText.trim().split(/\s+/).filter(w => w);
                if (activeMode === 'cloze' || activeMode === 'retry') {
                    return words.filter((_, i) => clozeIndices.has(i));
                }
                return words;
            }, [originalText, activeMode, clozeIndices]);

            const userWords = useMemo(() => userInput.trim().split(/\s+/).filter(w => w), [userInput]);

            const comparison = useMemo(() => {
                const words = originalText.trim().split(/\s+/).filter(w => w);
                return words.map((target, idx) => {
                    if (activeMode === 'cloze' || activeMode === 'retry') {
                        if (!clozeIndices.has(idx)) return { word: target, displayWord: target, status: 'visible', index: idx };
                        const clozeIdx = Array.from(clozeIndices).sort((a, b) => a - b).indexOf(idx);
                        const userTyped = userWords[clozeIdx] || "";
                        const status = isChecked ? (userTyped.toLowerCase() === target.toLowerCase() ? 'correct' : 'incorrect') : 'missing';
                        return { word: target, displayWord: isChecked ? (userTyped || "___") : "___", status, index: idx };
                    }
                    const userTyped = userWords[idx] || "";
                    const status = isChecked ? (userTyped.toLowerCase() === target.toLowerCase() ? 'correct' : 'incorrect') : 'missing';
                    return { word: target, displayWord: isChecked ? (userTyped || target) : target, status, index: idx };
                });
            }, [originalText, userWords, isChecked, activeMode, clozeIndices]);

            const accuracy = useMemo(() => {
                if (!targetWords.length) return 0;
                const correct = comparison.filter(item => (activeMode === 'cloze' || activeMode === 'retry' ? clozeIndices.has(item.index) : true) && item.status === 'correct').length;
                return Math.round((correct / targetWords.length) * 100);
            }, [comparison, targetWords, activeMode, clozeIndices]);

            return {
                difficulty, setDifficulty,
                userInput, setUserInput,
                isStarted, setIsStarted,
                isChecked, setIsChecked,
                isRetry, setIsRetry,
                manualIsHidden, setManualIsHidden,
                clozeIndices, setClozeIndices,
                activeMode, targetWords, userWords, comparison, accuracy,
                canCheck: userWords.length > 0 && !isChecked
            };
        }

        function App() {
            const [lang, setLang] = useState(localStorage.getItem('memora-lang') || 'en');
            const t = translations[lang];
            const [originalText, setOriginalText] = useState("");
            const [showReviewQueue, setShowReviewQueue] = useState(false);
            const [blurAmount, setBlurAmount] = useState(14);

            const { srsData, dueItems, pendingItems, deleteSRSItem, saveSRSItem } = useSRS();
            const { voices, selectedVoiceURI, setSelectedVoiceURI, rate, setRate, isSpeaking, isPaused, play, pause, resume, stop } = useTTS(originalText);
            const recall = useRecallLogic(originalText);

            useEffect(() => { localStorage.setItem('memora-lang', lang); }, [lang]);

            useEffect(() => {
                if (recall.isChecked && !recall.isRetry && originalText.trim()) saveSRSItem(originalText, recall.accuracy);
                if (recall.isChecked && recall.accuracy === 100) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#a855f7', '#34d399'] });
            }, [recall.isChecked, recall.accuracy]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!recall.isStarted && e.key === 'Enter' && originalText.trim()) recall.setIsStarted(true);
                    else if (e.key === 'Enter' && !recall.isChecked && recall.canCheck && !e.ctrlKey) { e.preventDefault(); recall.setIsChecked(true); }
                    else if (e.key === 'Escape') { recall.setIsStarted(false); recall.setUserInput(""); recall.setIsChecked(false); recall.setIsRetry(false); }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [recall, originalText]);

            const handleNextRound = () => {
                if (recall.accuracy > 90) recall.setDifficulty(d => Math.min(5, d + 1));
                else if (recall.accuracy < 60) recall.setDifficulty(d => Math.max(1, d - 1));
                recall.setUserInput(""); recall.setIsRetry(false); recall.setIsChecked(false); recall.setManualIsHidden(null);
            };

            const handleRetryMistakes = () => {
                const mistakes = new Set();
                recall.comparison.forEach(it => { if (it.status === 'incorrect' || it.status === 'missing') mistakes.add(it.index); });
                if (mistakes.size === 0) return;
                recall.setClozeIndices(mistakes); recall.setIsRetry(true); recall.setUserInput(""); recall.setIsChecked(false);
            };

            const isRefHidden = recall.isRetry ? false : (recall.manualIsHidden !== null ? recall.manualIsHidden : (recall.difficulty === 3 || recall.difficulty === 5));
            const isRefBlurred = (recall.manualIsHidden === null && !recall.isRetry) && (recall.difficulty === 2);

            return (
                <div className="container">
                    <Header lang={lang} setLang={setLang} t={t} onOpenCollection={() => setShowReviewQueue(true)} collectionCount={dueItems.length + pendingItems.length} />
                    {!recall.isStarted ? (
                        <HomeView t={t} originalText={originalText} setOriginalText={setOriginalText} onStart={() => recall.setIsStarted(true)} hasCollection={dueItems.length + pendingItems.length > 0} onOpenCollection={() => setShowReviewQueue(true)} />
                    ) : (
                        <>
                            <Dashboard t={t} recall={recall} />
                            <div className="main-layout">
                                <div className="panel">
                                    <div className="panel-header">
                                        <div className="panel-title"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>{t.referenceText}</div>
                                        <div className="panel-actions">
                                            {recall.difficulty === 2 && !recall.isRetry && (
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginRight: '1rem' }}>
                                                    <label style={{ fontSize: '0.85rem', color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>{t.blurLevel}:</label>
                                                    <input type="range" min="2" max="25" step="1" value={blurAmount} onChange={(e) => setBlurAmount(Number(e.target.value))} style={{ width: '80px', accentColor: '#a855f7', margin: 0 }} />
                                                </div>
                                            )}
                                            <button onClick={() => recall.setManualIsHidden(!isRefHidden)} className="secondary-btn">{isRefHidden ? t.showText : t.hideText}</button>
                                        </div>
                                    </div>
                                    {!isRefHidden ? (
                                        (recall.activeMode === 'cloze' || recall.activeMode === 'retry') ? (
                                            <div className="diff-display" style={{ minHeight: '150px', border: '1px solid var(--border)', background: 'rgba(0,0,0,0.3)' }}>
                                                {recall.comparison.map(item => (
                                                    <span key={item.index} className={`word ${item.status === 'visible' ? 'visible' : 'missing'}`}>
                                                        {item.status === 'visible' ? item.word : '___'}
                                                    </span>
                                                ))}
                                            </div>
                                        ) : (
                                            <textarea className={isRefBlurred ? "text-blurred" : ""} value={originalText} onChange={(e) => setOriginalText(e.target.value)} spellCheck="false" style={{ minHeight: '150px', '--blur-amt': `${blurAmount}px` }} />
                                        )
                                    ) : (
                                        <div className="reference-text" style={{ minHeight: '150px' }}>{recall.difficulty === 5 ? t.dictation : t.hiddenText}</div>
                                    )}
                                    <div className="tts-controls">
                                        <select value={selectedVoiceURI} onChange={(e) => setSelectedVoiceURI(e.target.value)} className="tts-select">{voices.map(v => <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}</select>
                                        <div className="rate-control"><label>{t.speed}: {rate.toFixed(1)}x</label><input type="range" min="0.5" max="2" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} /></div>
                                        <button onClick={isSpeaking && !isPaused ? pause : (isPaused ? resume : play)} className="speak-btn">{isSpeaking && !isPaused ? t.pause : (isPaused ? t.resume : t.play)}</button>
                                    </div>
                                </div>
                                <div className="panel">
                                    <div className="panel-header">
                                        <div className="panel-title"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path></svg>{t.practiceArea}</div>
                                        <button onClick={() => recall.setIsStarted(false)} className="secondary-btn">{t.restart}</button>
                                    </div>
                                    <textarea placeholder={recall.activeMode === 'cloze' ? t.placeholderCloze : (recall.activeMode === 'retry' ? t.placeholderRetry : (recall.activeMode === 'dictation' ? t.placeholderDict : t.placeholderFull))} value={recall.userInput} onChange={(e) => recall.setUserInput(e.target.value)} disabled={recall.isChecked} style={{ minHeight: '300px' }} />
                                    {recall.canCheck && <button onClick={() => recall.setIsChecked(true)} className="primary" style={{ width: '100%', marginTop: '1.5rem', padding: '1rem' }}>{t.checkBtn}</button>}
                                    {recall.isChecked && (
                                        <div className="completion-banner">
                                            <h3>{t.roundComplete}</h3>
                                            <p>{t.finalAccuracy}: <strong>{recall.accuracy}%</strong></p>
                                            <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', marginTop: '1.5rem' }}>
                                                {recall.accuracy < 100 && <button onClick={handleRetryMistakes} className="primary">{t.retryMistakes}</button>}
                                                <button onClick={handleNextRound} className="secondary-btn">{recall.accuracy > 90 ? t.advanceTo : t.retryLevel}</button>
                                            </div>
                                            <div className="diff-display" style={{ marginTop: '2rem', textAlign: 'left' }}>{recall.comparison.map(item => <span key={item.index} className={`word ${item.status}`}>{item.displayWord} </span>)}</div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </>
                    )}
                    {showReviewQueue && <CollectionModal t={t} dueItems={dueItems} pendingItems={pendingItems} onStartReview={(txt) => { setOriginalText(txt); recall.setIsStarted(true); setShowReviewQueue(false); }} onDelete={deleteSRSItem} onClose={() => setShowReviewQueue(false)} />}
                    <div className="footer" style={{ textAlign: 'center', padding: '2rem 0', opacity: 0.5 }}>{t.footer}</div>
                </div>
            );
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <>
                <div className="bg-orbit">
                    <div className="orbit-node node1"></div>
                    <div className="orbit-node node2"></div>
                    <div className="orbit-node node3"></div>
                </div>
                <App />
            </>
        );
    </script>
</body>

</html>
